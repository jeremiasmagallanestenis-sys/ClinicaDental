services:
  - type: web
    name: clinica-dental
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir web app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2
    envVars:
      - key: DB_PATH
        value: /opt/render/project/src/data/clinica.db
    disk:
      name: clinica-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
